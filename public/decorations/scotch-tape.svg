<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 30" width="120" height="30">
  <defs>
    <linearGradient id="scotch-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="35%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="scotch-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D0D0D0" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#E8E8E8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D0D0D0" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <!-- Base tape - very transparent -->
  <rect x="0" y="0" width="120" height="30" rx="0.5" ry="0.5" fill="#F8F8F8" opacity="0.18"/>
  <!-- Edge lines -->
  <rect x="0" y="0" width="120" height="1.5" fill="#C8C8C8" opacity="0.25"/>
  <rect x="0" y="28.5" width="120" height="1.5" fill="#C8C8C8" opacity="0.25"/>
  <!-- Sheen/gloss effect -->
  <rect x="0" y="0" width="120" height="30" fill="url(#scotch-sheen)"/>
  <!-- Diagonal light reflection -->
  <polygon points="30,0 50,0 20,30 0,30" fill="white" opacity="0.08"/>
  <polygon points="75,0 90,0 60,30 45,30" fill="white" opacity="0.06"/>
  <!-- Cut edges (slightly rough) -->
  <line x1="0" y1="1" x2="0" y2="29" stroke="#D8D8D8" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="1" x2="120" y2="29" stroke="#D8D8D8" stroke-width="0.5" opacity="0.3"/>
</svg>