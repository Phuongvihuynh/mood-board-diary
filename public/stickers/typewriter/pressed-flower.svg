<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Stem -->
  <path d="M50 85 C50 70, 45 60, 50 45" fill="none" stroke="#9CAF88" stroke-width="2" stroke-linecap="round"/>
  <!-- Small branch -->
  <path d="M50 65 C55 60, 62 58, 65 55" fill="none" stroke="#9CAF88" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Petals (pressed flat, slightly transparent) -->
  <ellipse cx="50" cy="35" rx="12" ry="8" fill="#F2C4C4" opacity="0.7" transform="rotate(-30 50 35)"/>
  <ellipse cx="50" cy="35" rx="12" ry="8" fill="#F2C4C4" opacity="0.6" transform="rotate(30 50 35)"/>
  <ellipse cx="50" cy="35" rx="12" ry="8" fill="#F2C4C4" opacity="0.5" transform="rotate(90 50 35)"/>
  <ellipse cx="50" cy="35" rx="12" ry="8" fill="#F2C4C4" opacity="0.6" transform="rotate(-70 50 35)"/>
  <ellipse cx="50" cy="35" rx="12" ry="8" fill="#F2C4C4" opacity="0.5" transform="rotate(70 50 35)"/>
  <!-- Center -->
  <circle cx="50" cy="35" r="5" fill="#8B6914" opacity="0.4"/>
  <circle cx="50" cy="35" r="3" fill="#8B6914" opacity="0.6"/>
  <!-- Small leaf -->
  <ellipse cx="62" cy="57" rx="8" ry="4" fill="#9CAF88" opacity="0.5" transform="rotate(-40 62 57)"/>
  <!-- Leaf veins -->
  <line x1="58" y1="59" x2="66" y2="55" stroke="#9CAF88" stroke-width="0.5" opacity="0.5"/>
</svg>
