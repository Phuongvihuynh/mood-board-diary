<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Perforated border -->
  <rect x="5" y="5" width="90" height="90" rx="2" fill="#F5E6CA" stroke="#8B6914" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- Inner border -->
  <rect x="12" y="12" width="76" height="76" rx="1" fill="none" stroke="#8B6914" stroke-width="1"/>
  <!-- Value text -->
  <text x="50" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#8B6914">POSTAGE</text>
  <!-- Decorative center -->
  <circle cx="50" cy="55" r="15" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  <circle cx="50" cy="55" r="10" fill="none" stroke="#8B6914" stroke-width="1"/>
  <text x="50" y="59" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#8B6914">5c</text>
  <!-- Corner ornaments -->
  <circle cx="18" cy="18" r="3" fill="#8B6914" opacity="0.3"/>
  <circle cx="82" cy="18" r="3" fill="#8B6914" opacity="0.3"/>
  <circle cx="18" cy="82" r="3" fill="#8B6914" opacity="0.3"/>
  <circle cx="82" cy="82" r="3" fill="#8B6914" opacity="0.3"/>
</svg>
