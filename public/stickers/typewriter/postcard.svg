<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Card body -->
  <rect x="5" y="15" width="90" height="70" rx="2" fill="#FDF6E3" stroke="#8B6914" stroke-width="2"/>
  <!-- Divider line -->
  <line x1="50" y1="20" x2="50" y2="80" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
  <!-- Address lines (right side) -->
  <line x1="55" y1="40" x2="88" y2="40" stroke="#8B6914" stroke-width="1" opacity="0.3"/>
  <line x1="55" y1="50" x2="88" y2="50" stroke="#8B6914" stroke-width="1" opacity="0.3"/>
  <line x1="55" y1="60" x2="88" y2="60" stroke="#8B6914" stroke-width="1" opacity="0.3"/>
  <line x1="55" y1="70" x2="88" y2="70" stroke="#8B6914" stroke-width="1" opacity="0.3"/>
  <!-- Stamp area -->
  <rect x="75" y="20" width="13" height="15" rx="1" fill="none" stroke="#8B6914" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- Left side decorative text -->
  <text x="28" y="45" text-anchor="middle" font-family="serif" font-size="7" fill="#8B6914" opacity="0.5">Dear Friend,</text>
  <line x1="12" y1="52" x2="45" y2="52" stroke="#8B6914" stroke-width="0.5" opacity="0.3"/>
  <line x1="12" y1="58" x2="45" y2="58" stroke="#8B6914" stroke-width="0.5" opacity="0.3"/>
  <line x1="12" y1="64" x2="45" y2="64" stroke="#8B6914" stroke-width="0.5" opacity="0.3"/>
  <!-- POST CARD header -->
  <text x="50" y="12" text-anchor="middle" font-family="serif" font-size="6" fill="#8B6914" letter-spacing="2">POST CARD</text>
</svg>
