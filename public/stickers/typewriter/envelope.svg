<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Envelope body -->
  <rect x="8" y="20" width="84" height="60" rx="3" fill="#FDF6E3" stroke="#8B6914" stroke-width="2"/>
  <!-- Flap -->
  <polygon points="8,20 50,50 92,20" fill="none" stroke="#8B6914" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner flap shadow -->
  <polygon points="12,23 50,48 88,23" fill="#8B6914" opacity="0.08"/>
  <!-- Seal circle -->
  <circle cx="50" cy="38" r="8" fill="#8B6914" opacity="0.15"/>
  <circle cx="50" cy="38" r="5" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
  <!-- Address lines -->
  <line x1="30" y1="58" x2="70" y2="58" stroke="#8B6914" stroke-width="0.8" opacity="0.3"/>
  <line x1="35" y1="65" x2="65" y2="65" stroke="#8B6914" stroke-width="0.8" opacity="0.3"/>
  <line x1="38" y1="72" x2="62" y2="72" stroke="#8B6914" stroke-width="0.8" opacity="0.3"/>
</svg>
