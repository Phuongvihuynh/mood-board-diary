<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0EC"/>
      <stop offset="50%" stop-color="#FAE4DE"/>
      <stop offset="100%" stop-color="#F5D5CC"/>
    </linearGradient>
    <filter id="rgNoise">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="4" seed="5"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#rg1)"/>
  <rect width="800" height="800" filter="url(#rgNoise)" opacity="0.3"/>
  <line x1="150" y1="0" x2="350" y2="800" stroke="#E8C0B0" stroke-width="1.2" opacity="0.2"/>
  <line x1="450" y1="0" x2="600" y2="800" stroke="#D4A898" stroke-width="0.8" opacity="0.15"/>
  <line x1="650" y1="0" x2="250" y2="800" stroke="#E8C0B0" stroke-width="0.6" opacity="0.12"/>
</svg>