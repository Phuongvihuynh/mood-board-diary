<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <radialGradient id="aging" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#F2DDB5"/>
      <stop offset="60%" stop-color="#E8D0A0"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#aging)"/>
  <rect width="800" height="800" filter="url(#noise)" opacity="0.4"/>
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#C4A870" stroke-width="0.5" opacity="0.3"/>
</svg>