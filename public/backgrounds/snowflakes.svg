<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <pattern id="snow" patternUnits="userSpaceOnUse" width="200" height="200">
      <rect width="200" height="200" fill="#F0F4F8"/>
      <g opacity="0.2" stroke="#8AB4D0" stroke-width="1" fill="none" transform="translate(50,50)">
        <line x1="0" y1="-20" x2="0" y2="20"/>
        <line x1="-17" y1="-10" x2="17" y2="10"/>
        <line x1="-17" y1="10" x2="17" y2="-10"/>
        <line x1="0" y1="-20" x2="-4" y2="-14"/>
        <line x1="0" y1="-20" x2="4" y2="-14"/>
        <line x1="0" y1="20" x2="-4" y2="14"/>
        <line x1="0" y1="20" x2="4" y2="14"/>
        <line x1="-17" y1="-10" x2="-12" y2="-12"/>
        <line x1="17" y1="10" x2="12" y2="12"/>
      </g>
      <g opacity="0.12" stroke="#8AB4D0" stroke-width="0.8" fill="none" transform="translate(150,150)">
        <line x1="0" y1="-14" x2="0" y2="14"/>
        <line x1="-12" y1="-7" x2="12" y2="7"/>
        <line x1="-12" y1="7" x2="12" y2="-7"/>
        <line x1="0" y1="-14" x2="-3" y2="-10"/>
        <line x1="0" y1="-14" x2="3" y2="-10"/>
        <line x1="0" y1="14" x2="-3" y2="10"/>
        <line x1="0" y1="14" x2="3" y2="10"/>
      </g>
      <circle cx="120" cy="80" r="1.5" fill="#8AB4D0" opacity="0.15"/>
      <circle cx="30" cy="170" r="1" fill="#8AB4D0" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#snow)"/>
</svg>